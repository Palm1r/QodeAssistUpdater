name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21', '1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v -o qodeassist-updater ./...

      - name: Run tests
        run: |
          if go list -f '{{len .TestGoFiles}}' ./... | grep -q '^0$'; then
            echo "No tests found, skipping test step"
          else
            go test -v ./...
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qodeassist-updater-${{ matrix.os }}-go${{ matrix.go-version }}
          path: qodeassist-updater*
          retention-days: 1

