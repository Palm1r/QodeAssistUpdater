name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-ci:
    name: Build and Test (CI)
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.23']
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: qodeassist-updater
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: qodeassist-updater
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: qodeassist-updater.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v -o ${{ matrix.artifact_name }} ./...
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod +x ${{ matrix.artifact_name }}
          fi

      - name: Run tests
        shell: bash
        run: |
          if go list -f '{{len .TestGoFiles}}' ./... | grep -q '^0$'; then
            echo "No tests found, skipping test step"
          else
            go test -v ./...
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qodeassist-updater-${{ matrix.os }}-go${{ matrix.go-version }}
          path: ${{ matrix.artifact_name }}*
          retention-days: 1

  build-release:
    name: Build Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: qodeassist-updater-linux-x64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: qodeassist-updater-macos-universal
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: qodeassist-updater-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 0
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # Build universal binary for macOS
            echo "Building universal macOS binary..."
            GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o qodeassist-updater-macos-arm64 ./...
            GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o qodeassist-updater-macos-amd64 ./...
            lipo -create qodeassist-updater-macos-arm64 qodeassist-updater-macos-amd64 -output ${{ matrix.artifact_name }}
            chmod +x ${{ matrix.artifact_name }}
            rm qodeassist-updater-macos-arm64 qodeassist-updater-macos-amd64
            echo "Universal macOS binary created"
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} ./...
            if [ "${{ matrix.goos }}" != "windows" ]; then
              chmod +x ${{ matrix.artifact_name }}
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

  create-release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files
          # Find and copy all binaries from artifact subdirectories
          find artifacts -type f -name "qodeassist-updater*" ! -name "*.sha256" -exec cp {} release-files/ \;
          # List files for debugging
          echo "Files prepared for release:"
          ls -lh release-files/

      - name: Create checksums
        shell: bash
        run: |
          cd release-files
          for file in qodeassist-updater*; do
            if [ -f "$file" ]; then
              if command -v sha256sum > /dev/null; then
                sha256sum "$file" > "$file.sha256"
              elif command -v shasum > /dev/null; then
                shasum -a 256 "$file" > "$file.sha256"
              fi
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            ## QodeAssist Updater ${{ steps.tag.outputs.tag }}

            ### Installation

            1. Download the appropriate binary for your platform
            2. Make it executable (Unix systems): `chmod +x qodeassist-updater-*`
            3. Move to a directory in your PATH or use directly

            ### Usage

            See [README.md](README.md) for usage instructions.

            ### Checksums

            SHA256 checksums are provided for all binaries.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
