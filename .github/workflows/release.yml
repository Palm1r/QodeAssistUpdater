name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: qodeassist-updater-linux-x64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: qodeassist-updater-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: qodeassist-updater-macos-x64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: qodeassist-updater-macos-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: qodeassist-updater-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} ./...
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Windows binary already has .exe extension
            echo "Built Windows binary"
          else
            # For Unix systems, ensure executable permissions
            chmod +x ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

  create-release:
    name: Create Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for file in qodeassist-updater*; do
            if [ -f "$file" ]; then
              if command -v sha256sum > /dev/null; then
                sha256sum "$file" > "$file.sha256"
              elif command -v shasum > /dev/null; then
                shasum -a 256 "$file" > "$file.sha256"
              fi
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            ## QodeAssist Updater ${{ steps.tag.outputs.tag }}

            ### Downloads

            **Linux:**
            - `qodeassist-updater-linux-x64` - Linux x64
            - `qodeassist-updater-linux-arm64` - Linux ARM64

            **macOS:**
            - `qodeassist-updater-macos-x64` - macOS Intel
            - `qodeassist-updater-macos-arm64` - macOS Apple Silicon

            **Windows:**
            - `qodeassist-updater-windows-x64.exe` - Windows x64

            ### Installation

            1. Download the appropriate binary for your platform
            2. Make it executable (Unix systems): `chmod +x qodeassist-updater-*`
            3. Move to a directory in your PATH or use directly

            ### Usage

            See [README.md](README.md) for usage instructions.

            ### Checksums

            SHA256 checksums are provided for all binaries.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

